# SAT skill map. Exam-agnostic shape:
#   exam -> domains -> sections -> skills -> subskills
# Skill ids are stable identifiers referenced by lessons and questions.
exam_id: sat
version: "1.0.0"
domains:
  - id: reading_writing
    name: "Reading and Writing"
    sections:
      - id: information_and_ideas
        name: "Information and Ideas"
        skills:
          - id: main_idea
            name: "Central Ideas and Main Idea"
            subskills: [central_idea, summary]
          - id: inferences
            name: "Inferences"
            subskills: [logical_completion, implied_meaning]
          - id: command_of_evidence
            name: "Command of Evidence"
            subskills: [textual_evidence, quantitative_evidence]
      - id: craft_and_structure
        name: "Craft and Structure"
        skills:
          - id: words_in_context
            name: "Words in Context"
            subskills: [vocabulary, precise_word_choice]
          - id: text_structure_purpose
            name: "Text Structure and Purpose"
            subskills: [overall_structure, authors_purpose]
          - id: cross_text_connections
            name: "Cross-Text Connections"
            subskills: [compare_viewpoints]
      - id: expression_of_ideas
        name: "Expression of Ideas"
        skills:
          - id: transitions
            name: "Transitions"
            subskills: [logical_transitions]
          - id: rhetorical_synthesis
            name: "Rhetorical Synthesis"
            subskills: [synthesize_notes]
          - id: concision
            name: "Concision"
            subskills: [eliminate_redundancy]
      - id: standard_english_conventions
        name: "Standard English Conventions"
        skills:
          - id: sentence_boundaries
            name: "Sentence Boundaries"
            subskills: [run_ons, fragments, clause_joining]
          - id: subject_verb_agreement
            name: "Subject-Verb Agreement"
            subskills: [agreement]
          - id: punctuation
            name: "Punctuation and Possessives"
            subskills: [apostrophes, commas]
          - id: pronouns
            name: "Pronouns"
            subskills: [pronoun_case]
          - id: modifiers
            name: "Modifier Placement"
            subskills: [dangling_modifiers]
  - id: math
    name: "Math"
    sections:
      - id: algebra
        name: "Algebra"
        skills:
          - id: linear_equations
            name: "Linear Equations"
            subskills: [one_variable, two_variable, slope_intercept]
          - id: linear_inequalities
            name: "Linear Inequalities"
            subskills: [one_variable, graph_regions]
          - id: systems_of_equations
            name: "Systems of Equations"
            subskills: [substitution, elimination]
      - id: advanced_math
        name: "Advanced Math"
        skills:
          - id: functions
            name: "Functions"
            subskills: [evaluate, interpret]
          - id: quadratics
            name: "Quadratics"
            subskills: [factoring, vertex, roots]
          - id: exponents_radicals
            name: "Exponents and Radicals"
            subskills: [exponent_rules, radical_simplify]
          - id: polynomials
            name: "Polynomial Expressions"
            subskills: [operations, factoring]
      - id: problem_solving_data
        name: "Problem-Solving and Data Analysis"
        skills:
          - id: ratios_percentages_units
            name: "Ratios, Percentages, and Units"
            subskills: [percent_change, unit_rate]
          - id: proportions
            name: "Proportions"
            subskills: [direct_proportion, scaling]
          - id: data_analysis
            name: "Data Analysis"
            subskills: [tables, graphs]
          - id: statistics
            name: "Statistics"
            subskills: [mean_median_mode, spread]
          - id: probability
            name: "Probability"
            subskills: [simple_probability, two_way_tables]
      - id: geometry_trigonometry
        name: "Geometry and Trigonometry"
        skills:
          - id: area_volume
            name: "Area and Volume"
            subskills: [area, volume]
          - id: circles
            name: "Circles"
            subskills: [circumference_area, arc_sector]
          - id: right_triangles
            name: "Right Triangles"
            subskills: [pythagorean, special_triangles]
          - id: trigonometry
            name: "Basic Trigonometry"
            subskills: [sohcahtoa]
