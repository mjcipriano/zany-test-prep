# Top-level descriptor for an exam. Exam-agnostic shape: ACT/AP files mirror this.
exam_id: sat
exam_name: "SAT"
display_name: "Digital SAT"
enabled: true            # only SAT is surfaced in the UI initially
content_version: "1.0.0"
description: >
  Original, SAT-style practice for the Digital SAT, covering the Reading and
  Writing section and the Math section. All content is original and contains no
  copyrighted College Board material.
domains:
  - reading_writing
  - math
# Difficulty ladder used across the app (ordered easy -> hard).
difficulties: [easy, medium, hard]
question_types:
  - multiple_choice
  - student_produced
  - passage_reading
  - grammar_editing
  - data_interpretation
  - multi_step_math
