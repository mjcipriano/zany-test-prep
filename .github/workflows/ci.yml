# CI workflow for the zany_test_prep Flutter app.
# Runs format/analyze/test plus Python content validation on every push and PR.
name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"

jobs:
  build-and-test:
    name: Format, Analyze, Validate & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Flutter Android tooling needs a JDK. Temurin 17 matches the project's JDK.
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # Pin Flutter to a known-good stable version and enable the action's cache.
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.35.5"
          channel: stable
          cache: true

      - name: Install Dart/Flutter dependencies
        run: flutter pub get

      # Code generation: only meaningful if build_runner is a dependency.
      # This repo does not currently depend on build_runner, so the step is
      # guarded: it runs codegen if available and never fails the build (|| true).
      # If you add build_runner later, this will start generating sources
      # automatically; remove the "|| true" if you want codegen failures to block.
      - name: Run code generation (if build_runner present)
        run: |
          if grep -qE '^\s*build_runner\s*:' pubspec.yaml; then
            echo "build_runner found; running code generation"
            dart run build_runner build --delete-conflicting-outputs
          else
            echo "build_runner not a dependency; skipping code generation"
          fi || true

      - name: Check Dart formatting
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze project source
        run: flutter analyze

      # Python is used to validate offline content (questions/answers, etc.).
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install content validation dependencies
        run: pip install pyyaml jsonschema

      - name: Validate content
        run: python tools/validate_content.py

      # Rebuild the asset bundle from canonical content and fail if the committed
      # bundle is stale, so assets/ never drifts from content/.
      - name: Build content bundle and check it is up to date
        run: |
          python tools/build_bundle.py
          git diff --exit-code assets/content/ \
            || (echo "::error::assets/content bundle is stale; run python tools/build_bundle.py and commit" && exit 1)

      - name: Run Flutter tests
        run: flutter test

      # On failure, capture any logs that exist so they can be inspected without
      # re-running the job. if-no-files-found is set to "ignore" so a missing
      # logs directory does not itself fail the upload step.
      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ci-logs
          path: |
            **/*.log
            build/**/*.txt
          if-no-files-found: ignore
          retention-days: 7
