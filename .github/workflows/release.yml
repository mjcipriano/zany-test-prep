# Release workflow.
# Triggered manually (workflow_dispatch) or by pushing a tag like v1.0.0.
# Produces a release APK (and, best-effort, an app bundle). When run from a
# version tag it also creates a GitHub Release with the APK attached.
name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

# Needed for softprops/action-gh-release@v2 to create releases / upload assets.
permissions:
  contents: write

jobs:
  build-release:
    name: Build & Publish Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.35.5"
          channel: stable
          cache: true

      - name: Install Dart/Flutter dependencies
        run: flutter pub get

      # -------------------------------------------------------------------------
      # RELEASE SIGNING (stable key).
      #
      # When the KEYSTORE_BASE64 secret is set, decode the stable release keystore
      # and write android/key.properties so CI signs with the SAME key as local
      # releases — letting users update in place. Without the secret the build
      # falls back to debug signing (handled in android/app/build.gradle.kts), so
      # the workflow still runs for contributors/forks.
      #
      # Required repo secrets (Settings -> Secrets and variables -> Actions):
      #   KEYSTORE_BASE64 - base64 of android/app/zany-release.jks
      #   KEY_ALIAS, KEY_PASSWORD, STORE_PASSWORD
      # -------------------------------------------------------------------------
      # Note: the `secrets` context can't be used in a step `if:`, so the
      # presence check happens inside the script (absent secret -> debug signing).
      - name: Decode keystore and write signing config
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "KEYSTORE_BASE64 not set — falling back to debug signing."
            exit 0
          fi
          echo "$KEYSTORE_BASE64" | base64 --decode > android/app/zany-release.jks
          cat > android/key.properties <<EOF
          storeFile=zany-release.jks
          storePassword=$STORE_PASSWORD
          keyAlias=$KEY_ALIAS
          keyPassword=$KEY_PASSWORD
          EOF
          echo "Wrote android/key.properties for stable release signing."

      - name: Build release APK
        run: flutter build apk --release

      # App bundle is a nice-to-have for Play Store uploads. Made non-blocking
      # with "|| true" so a failure here never fails the release.
      - name: Build release app bundle (non-blocking)
        run: flutter build appbundle --release || true

      - name: Upload release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
          retention-days: 30

      # The .aab may not exist if the bundle build was skipped/failed; ignore it
      # if missing so the workflow still succeeds.
      - name: Upload release app bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: build/app/outputs/bundle/release/app-release.aab
          if-no-files-found: ignore
          retention-days: 30

      # Name the APK after the tag for a clean, unambiguous release asset.
      - name: Stage tag-named APK
        if: startsWith(github.ref, 'refs/tags/v')
        run: cp build/app/outputs/flutter-apk/app-release.apk "zany-test-prep-${GITHUB_REF_NAME}.apk"

      # Only create a GitHub Release when triggered by a version tag push.
      # Attaches just the stable-signed, tag-named APK (sideload target).
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: zany-test-prep-${{ github.ref_name }}.apk
