name: zany_test_prep
description: "Zany Test Prep — an offline-first, Duolingo-style SAT prep app."
publish_to: 'none'

# versionName is the part before '+', versionCode the part after.
# Keep versionName in sync with kAppVersion (lib/features/settings/about_screen.dart).
version: 1.7.3+10

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management.
  flutter_riverpod: ^2.6.1
  # Navigation.
  go_router: ^14.6.2
  # Local persistence (robust, offline, no backend). Behind a small interface so
  # it is easy to fake in tests.
  shared_preferences: ^2.3.3
  # Plays short, bundled UI sound effects (offline). Behind a SoundService so it
  # is a no-op in tests.
  audioplayers: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter

  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  # Offline content bundle, built from content/ by tools/build_bundle.py.
  assets:
    - assets/content/
    - assets/audio/
    # Avatar customization pack (vendored from
    # mjcipriano/zany-test-prep-avatars). Managed by tools/sync_avatars.py;
    # re-run it to pull a new release/tag. Image folders are listed even when
    # not yet populated so a later sync adds art without touching pubspec.
    - assets/avatar/pack_version.json
    - assets/avatar/manifest/avatar_catalog.json
    - assets/avatar/avatars/starter/
    - assets/avatar/avatars/advanced/
    - assets/avatar/items/headwear/
    - assets/avatar/items/eyewear/
    - assets/avatar/items/face_accessory/
    - assets/avatar/items/ear_accessory/
    - assets/avatar/items/neck_accessory/
    - assets/avatar/items/chest_badge/
    - assets/avatar/items/jacket_overlay/
    - assets/avatar/items/back_aura/
    - assets/avatar/items/background_frame/
    - assets/avatar/items/floating_props/
    - assets/avatar/pets/common/
    - assets/avatar/pets/uncommon/
    - assets/avatar/pets/rare/
    - assets/avatar/pets/epic/
    - assets/avatar/pets/legendary/
