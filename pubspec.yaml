name: zany_test_prep
description: "Zany Test Prep — an offline-first, Duolingo-style SAT prep app."
publish_to: 'none'

# versionName is the part before '+', versionCode the part after.
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management.
  flutter_riverpod: ^2.6.1
  # Navigation.
  go_router: ^14.6.2
  # Local persistence (robust, offline, no backend). Behind a small interface so
  # it is easy to fake in tests.
  shared_preferences: ^2.3.3
  # Plays short, bundled UI sound effects (offline). Behind a SoundService so it
  # is a no-op in tests.
  audioplayers: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter

  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  # Offline content bundle, built from content/ by tools/build_bundle.py.
  assets:
    - assets/content/
    - assets/audio/
